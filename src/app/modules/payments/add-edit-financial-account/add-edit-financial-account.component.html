<div class="account-form-page">
  <div class="card">
    <div class="card-header">
      <h3>{{ isEdit ? 'Edit Financial Account' : 'Add Financial Account' }}</h3>
      <p>Accounts are used only when approved payments are posted.</p>
    </div>
    <div class="card-body">
      <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border text-success"></div>
      </div>

      <form *ngIf="!loading" [formGroup]="accountForm" (ngSubmit)="save()">
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Account Code *</label>
            <input type="text" class="form-control" formControlName="accountCode" placeholder="CASH-MAIN">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Account Name *</label>
            <input type="text" class="form-control" formControlName="accountName" placeholder="Main Cash">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Account Type *</label>
            <select class="form-select" formControlName="accountType">
              <option *ngFor="let type of accountTypes" [value]="type">{{ type.replace('_', ' ') }}</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Account Number</label>
            <input type="text" class="form-control" formControlName="accountNumber">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Bank Name</label>
            <input type="text" class="form-control" formControlName="bankName">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Branch Name</label>
            <input type="text" class="form-control" formControlName="branchName">
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Mobile Provider</label>
            <input type="text" class="form-control" formControlName="mobileProvider" placeholder="bKash/Nagad/Rocket">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Currency *</label>
            <input type="text" class="form-control" formControlName="currencyCode">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Opening Balance</label>
            <input type="number" step="0.01" min="0" class="form-control" formControlName="openingBalance" [readonly]="isEdit">
            <small class="text-muted" *ngIf="isEdit">Opening balance cannot be changed after account creation.</small>
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Status *</label>
            <select class="form-select" formControlName="status">
              <option value="ACTIVE">ACTIVE</option>
              <option value="INACTIVE">INACTIVE</option>
              <option value="CLOSED">CLOSED</option>
            </select>
          </div>
          <div class="col-md-4 mb-3 d-flex align-items-end">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="allowOverdraft" formControlName="allowOverdraft">
              <label class="form-check-label" for="allowOverdraft">Allow overdraft</label>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-success" [disabled]="loading">
            {{ isEdit ? 'Update Account' : 'Create Account' }}
          </button>
          <button type="button" class="btn btn-outline-secondary ms-2" (click)="cancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
