<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>{{ isEdit ? 'Edit Product Variation' : 'Add Product Variation' }}</h3>
    </div>
    <div class="card-body">
      <form (ngSubmit)="save()">
        <div class="variation-form-layout">
          <div class="variation-main-fields">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Product *</label>
            <select class="form-select" [(ngModel)]="variation.productId" name="productId" required>
              <option [value]="0">Select Product</option>
              <option *ngFor="let p of products" [value]="p.id">{{ p.productName }}</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">SKU *</label>
            <input type="text" class="form-control" [(ngModel)]="variation.sku" name="sku" required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-12 mb-3">
            <label class="form-label">Variation Name</label>
            <input type="text" class="form-control" [(ngModel)]="variation.variationName" name="name">
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Buying Price</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="variation.buyingPrice" name="buyingPrice">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Additional Price</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="variation.additionalPrice" name="additionalPrice">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" [(ngModel)]="variation.status" name="status">
              <option [value]="true">Active</option>
              <option [value]="false">Inactive</option>
            </select>
          </div>
        </div>
          </div>

          <aside class="variant-media-studio">
            <div class="studio-kicker">Variant Media Studio</div>
            <div class="studio-preview-frame">
              <span class="studio-label">VARIANT IMAGE</span>
              <img *ngIf="previewImageUrl; else variationPlaceholder" [src]="previewImageUrl" alt="Variation image preview">
              <ng-template #variationPlaceholder>
                <div class="variation-placeholder">
                  <i class="bi bi-layers"></i>
                  <span>No variant image</span>
                </div>
              </ng-template>
              <span class="studio-sku-badge" *ngIf="variation.sku">{{ variation.sku }}</span>
            </div>

            <div class="parent-product-chip" *ngIf="selectedProduct">
              <i class="bi bi-box-seam"></i>
              <span>{{ selectedProduct.productName }}</span>
            </div>
            <div class="parent-product-chip muted" *ngIf="!selectedProduct">
              <i class="bi bi-box"></i>
              <span>Select parent product</span>
            </div>

            <div
              class="variant-dropzone"
              (drop)="onImageDrop($event)"
              (dragover)="onImageDragOver($event)">
              <i class="bi bi-cloud-arrow-up"></i>
              <strong>Drop variant image here</strong>
              <span>JPG, PNG, WEBP up to 5MB</span>
              <label class="btn btn-outline-success btn-sm mt-2">
                {{ isEdit && previewImageUrl ? 'Replace Image' : 'Choose Variant Image' }}
                <input type="file" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp" hidden (change)="onImageSelected($event)">
              </label>
            </div>

            <div class="text-danger small mt-2" *ngIf="imageError">{{ imageError }}</div>
            <button type="button" class="btn btn-link text-danger btn-sm px-0 mt-2" (click)="removeImage()" *ngIf="previewImageUrl || existingImagePreviewUrl">
              Remove Image
            </button>
          </aside>
        </div>

        <div class="mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Save') }}
          </button>
          <button type="button" class="btn btn-secondary ms-2" (click)="cancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
