<div class="product-form-container">
  <div class="form-header">
    <h2>{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</h2>
    <button class="btn-close" (click)="cancel()">✕</button>
  </div>

  <div *ngIf="loading" class="loading-spinner">
    <div class="spinner"></div>
    <p>Loading product details...</p>
  </div>

  <div *ngIf="!loading">
    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

    <form (ngSubmit)="onSubmit()" #productForm="ngForm" class="product-form">
      <div class="form-grid">
        <!-- Left Column -->
        <div class="form-section">
          <h3>Basic Information</h3>
          <div class="form-group">
            <label>Product Code *</label>
            <input type="text" [(ngModel)]="product.productCode" name="productCode" required class="form-control" />
          </div>
          <div class="form-group">
            <label>SKU *</label>
            <input type="text" [(ngModel)]="product.sku" name="sku" required class="form-control" />
          </div>
          <div class="form-group">
            <label>Product Name *</label>
            <input type="text" [(ngModel)]="product.productName" name="productName" required class="form-control" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea [(ngModel)]="product.description" name="description" rows="3" class="form-control"></textarea>
          </div>
          <div class="form-group">
            <label>Product Image</label>
            <div class="product-image-upload">
              <img
                class="product-image-preview"
                [src]="imagePreviewUrl || placeholderImage"
                (error)="onImageError($event)"
                alt="Product preview">
              <div class="product-image-control">
                <input
                  type="file"
                  accept="image/jpeg,image/png,image/webp"
                  class="form-control"
                  (change)="onImageSelected($event)">
                <small>JPG, PNG, WEBP up to 5MB</small>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>Category ID</label>
            <input type="number" [(ngModel)]="product.categoryId" name="categoryId" class="form-control" />
          </div>
        </div>

        <!-- Right Column -->
        <div class="form-section">
          <h3>Pricing & Stock</h3>
          <div class="form-row">
            <div class="form-group half">
              <label>Buying Price</label>
              <input type="number" step="0.01" [(ngModel)]="product.buyingPrice" name="buyingPrice" class="form-control" />
            </div>
            <div class="form-group half">
              <label>Selling Price *</label>
              <input type="number" step="0.01" [(ngModel)]="product.sellingPrice" name="sellingPrice" required class="form-control" />
            </div>
          </div>
          <div class="form-group">
            <label>Tax Rate (%)</label>
            <input type="number" step="0.01" [(ngModel)]="product.taxRate" name="taxRate" class="form-control" />
          </div>
          <div class="form-row">
            <div class="form-group third">
              <label>Min Stock</label>
              <input type="number" [(ngModel)]="product.minStockLevel" name="minStockLevel" class="form-control" />
            </div>
            <div class="form-group third">
              <label>Max Stock</label>
              <input type="number" [(ngModel)]="product.maxStockLevel" name="maxStockLevel" class="form-control" />
            </div>
            <div class="form-group third">
              <label>Reorder Level</label>
              <input type="number" [(ngModel)]="product.reorderLevel" name="reorderLevel" class="form-control" />
            </div>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select [(ngModel)]="product.status" name="status" class="form-control">
              <option *ngFor="let opt of statusOptions" [value]="opt">{{ opt }}</option>
            </select>
          </div>

          <div class="form-group">
            <label>Select Unit</label>
            <select [(ngModel)]="product.selectUnit" name="selectUnit" class="form-control">
              <option *ngFor="let opt of selectUnitOptions" [value]="opt.value">{{ opt.label }}</option>
            </select>
          </div>

          <div class="info-box" *ngIf="isEditMode">
            <p><strong>Created:</strong> {{ product.createdAt | date:'medium' }}</p>
            <p><strong>Last Updated:</strong> {{ product.updatedAt | date:'medium' }}</p>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="!productForm.valid || submitting">
          <span *ngIf="submitting" class="spinner-small"></span>
          {{ submitting ? 'Saving...' : (isEditMode ? 'Update Product' : 'Save Product') }}
        </button>
      </div>
    </form>
  </div>
</div>
