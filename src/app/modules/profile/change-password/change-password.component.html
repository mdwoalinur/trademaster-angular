<div class="password-page">
  <section class="password-card">
    <div class="section-heading">
      <div>
        <p class="eyebrow">{{ 'PROFILE.SECURITY' | translate }}</p>
        <h2>{{ 'PROFILE.CHANGE_PASSWORD' | translate }}</h2>
      </div>
      <a routerLink="/settings"><i class="bi bi-gear"></i> {{ 'HEADER.SETTINGS' | translate }}</a>
    </div>

    <form *ngIf="!otpSent" [formGroup]="passwordForm" (ngSubmit)="requestOtp()" class="password-form">
      <label>
        <span>{{ 'PROFILE.CURRENT_PASSWORD' | translate }}</span>
        <input type="password" class="form-control" formControlName="currentPassword" autocomplete="current-password">
      </label>
      <label>
        <span>{{ 'PROFILE.NEW_PASSWORD' | translate }}</span>
        <input type="password" class="form-control" formControlName="newPassword" autocomplete="new-password">
      </label>
      <label>
        <span>{{ 'PROFILE.CONFIRM_PASSWORD' | translate }}</span>
        <input type="password" class="form-control" formControlName="confirmPassword" autocomplete="new-password">
      </label>
      <button type="submit" class="btn btn-primary" [disabled]="saving">
        <span *ngIf="saving" class="spinner-border spinner-border-sm"></span>
        <i *ngIf="!saving" class="bi bi-envelope-lock"></i>
        {{ saving ? ('COMMON.SAVING' | translate) : ('PROFILE.SEND_CONFIRMATION_CODE' | translate) }}
      </button>
    </form>

    <form *ngIf="otpSent" [formGroup]="otpForm" (ngSubmit)="confirmOtp()" class="password-form">
      <div class="otp-note">
        <i class="bi bi-envelope-check"></i>
        <span>{{ 'PROFILE.OTP_SENT_NOTE' | translate }}</span>
      </div>
      <label>
        <span>{{ 'PROFILE.OTP_CODE' | translate }}</span>
        <input type="text" class="form-control otp-input" formControlName="otpCode" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
      </label>
      <div class="otp-actions">
        <button type="submit" class="btn btn-primary" [disabled]="saving">
          <span *ngIf="saving" class="spinner-border spinner-border-sm"></span>
          <i *ngIf="!saving" class="bi bi-shield-check"></i>
          {{ saving ? ('COMMON.SAVING' | translate) : ('PROFILE.CONFIRM_PASSWORD_CHANGE' | translate) }}
        </button>
        <button type="button" class="btn btn-outline-primary" (click)="resendOtp()" [disabled]="resending || saving">
          <span *ngIf="resending" class="spinner-border spinner-border-sm"></span>
          <i *ngIf="!resending" class="bi bi-arrow-clockwise"></i>
          {{ 'PROFILE.RESEND_CODE' | translate }}
        </button>
        <button type="button" class="btn btn-link" (click)="otpSent = false" [disabled]="saving">
          {{ 'COMMON.BACK' | translate }}
        </button>
      </div>
      <small class="security-note">{{ 'PROFILE.OTP_SECURITY_NOTE' | translate }}</small>
    </form>
  </section>
</div>
