<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>{{ isEdit ? 'Edit Wastage Record' : 'Add Wastage Record' }}</h3>
    </div>
    <div class="card-body">
      <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      <form [formGroup]="recordForm" (ngSubmit)="save()" *ngIf="!loading">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Product *</label>
            <select class="form-select" formControlName="productId">
              <option [value]="null">Select Product</option>
              <!-- Fixed: p.id instead of p.productId -->
              <option *ngFor="let p of products" [value]="p.id">{{ p.productName }}</option>
            </select>
            <div class="text-danger" *ngIf="recordForm.get('productId')?.invalid && recordForm.get('productId')?.touched">
              Product is required
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Warehouse *</label>
            <select class="form-select" formControlName="warehouseId">
              <option [value]="null">Select Warehouse</option>
              <option *ngFor="let w of warehouses" [value]="w.id">{{ w.name }}</option>
            </select>
            <div class="text-danger" *ngIf="recordForm.get('warehouseId')?.invalid && recordForm.get('warehouseId')?.touched">
              Warehouse is required
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Wastage Type *</label>
            <select class="form-select" formControlName="wastageType">
              <option [value]="null">Select Type</option>
              <option *ngFor="let t of wastageTypes" [value]="t">{{ t }}</option>
            </select>
            <div class="text-danger" *ngIf="recordForm.get('wastageType')?.invalid && recordForm.get('wastageType')?.touched">
              Wastage type is required
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Quantity *</label>
            <input type="number" step="0.001" class="form-control" formControlName="quantity">
            <div class="text-danger" *ngIf="recordForm.get('quantity')?.invalid && recordForm.get('quantity')?.touched">
              <span *ngIf="recordForm.get('quantity')?.errors?.['required']">Quantity is required</span>
              <span *ngIf="recordForm.get('quantity')?.errors?.['min']">Quantity must be at least 0.001</span>
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Wastage Date *</label>
            <input type="date" class="form-control" formControlName="wastageDate">
            <div class="text-danger" *ngIf="recordForm.get('wastageDate')?.invalid && recordForm.get('wastageDate')?.touched">
              Wastage date is required
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-12 mb-3">
            <label class="form-label">Reason</label>
            <textarea class="form-control" formControlName="reason" rows="2" placeholder="Enter reason for wastage..."></textarea>
          </div>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Batch No</label>
            <input type="text" class="form-control" formControlName="batchNo" placeholder="e.g., BATCH-001">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Manufacturing Date</label>
            <input type="date" class="form-control" formControlName="manufacturingDate">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Expiry Date</label>
            <input type="date" class="form-control" formControlName="expiryDate">
          </div>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Financial Loss</label>
            <input type="number" step="0.01" class="form-control" formControlName="financialLoss" placeholder="0.00">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Recovery Amount</label>
            <input type="number" step="0.01" class="form-control" formControlName="recoveryAmount" placeholder="0.00">
          </div>
        </div>
        <div class="row">
          <div class="col-md-12 mb-3">
            <label class="form-label">Notes</label>
            <textarea class="form-control" formControlName="notes" rows="2" placeholder="Additional notes..."></textarea>
          </div>
        </div>
        <div class="mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            <i class="bi bi-save" *ngIf="!loading"></i>
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Save') }}
          </button>
          <button type="button" class="btn btn-secondary ms-2" (click)="cancel()" [disabled]="loading">
            <i class="bi bi-x-circle"></i> Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
