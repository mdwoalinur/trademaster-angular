<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>{{ isEdit ? 'Edit Unit' : 'Add New Unit' }}</h3>
    </div>
    <div class="card-body">
      <form (ngSubmit)="save()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Unit Code *</label>
            <input type="text" class="form-control" [(ngModel)]="unit.unitCode" name="code" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Unit Name *</label>
            <input type="text" class="form-control" [(ngModel)]="unit.unitName" name="name" required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Unit Type</label>
            <select class="form-select" [(ngModel)]="unit.unitType" name="unitType">
              <option *ngFor="let type of unitTypes" [value]="type">{{ type }}</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Base Unit ID (optional)</label>
            <input type="number" class="form-control" [(ngModel)]="unit.baseUnitId" name="baseUnitId">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Conversion Factor</label>
            <input type="number" step="any" class="form-control" [(ngModel)]="unit.conversionFactor" name="conversionFactor">
          </div>
          <div class="col-md-6 mb-3">
            <div class="form-check mt-4">
              <input type="checkbox" class="form-check-input" [(ngModel)]="unit.isBase" name="isBase" id="isBase">
              <label class="form-check-label" for="isBase">Is Base Unit</label>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Status</label>
          <select class="form-select" [(ngModel)]="unit.status" name="status">
            <option [value]="true">Active</option>
            <option [value]="false">Inactive</option>
          </select>
        </div>

        <div class="mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Save') }}
          </button>
          <button type="button" class="btn btn-secondary ms-2" (click)="cancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
