<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>{{ isEdit ? 'Edit Expense Category' : 'Add Expense Category' }}</h3>
    </div>
    <div class="card-body">
      <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>
      <form [formGroup]="categoryForm" (ngSubmit)="save()" *ngIf="!loading">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Category Name *</label>
            <input type="text" class="form-control" formControlName="categoryName">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Category Code *</label>
            <input type="text" class="form-control" formControlName="categoryCode" style="text-transform:uppercase">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Parent Category (Optional)</label>
          <input type="number" class="form-control" formControlName="parentCategoryId" placeholder="Parent Category ID">
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" formControlName="description" rows="2"></textarea>
        </div>
        <div class="mb-3">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" formControlName="status" id="status">
            <label class="form-check-label" for="status">Active</label>
          </div>
        </div>
        <div class="mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Save') }}
          </button>
          <button type="button" class="btn btn-secondary ms-2" (click)="cancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
