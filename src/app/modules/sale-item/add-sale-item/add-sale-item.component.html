<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>{{ isEdit ? 'Edit Sale Item' : 'Add Sale Item' }}</h3>
    </div>
    <div class="card-body">
      <form (ngSubmit)="save()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Sale Invoice *</label>
            <select class="form-select" [(ngModel)]="saleItem.saleId" name="saleId" required>
              <option [value]="0">Select Sale</option>
              <option *ngFor="let s of sales" [value]="s.saleId">{{ s.invoiceNo }}</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Product *</label>
            <select class="form-select" [(ngModel)]="saleItem.productId" name="productId" required>
              <option [value]="0">Select Product</option>
              <option *ngFor="let p of products" [value]="p.id">{{ p.productName }}</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-3 mb-3">
            <label class="form-label">Quantity *</label>
            <input type="number" class="form-control" [(ngModel)]="saleItem.quantity" (change)="calculate()" name="quantity" required>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Unit Price</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="saleItem.unitPrice" (change)="calculate()" name="unitPrice">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Discount %</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="saleItem.discountPercent" (change)="calculate()" name="discountPercent">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Tax Rate %</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="saleItem.taxRate" name="taxRate">
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Discount Amount</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="saleItem.discountAmount" name="discountAmount" readonly>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Total Price</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="saleItem.totalPrice" name="totalPrice" readonly>
          </div>
        </div>

        <div class="mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Save') }}
          </button>
          <button type="button" class="btn btn-secondary ms-2" (click)="cancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
